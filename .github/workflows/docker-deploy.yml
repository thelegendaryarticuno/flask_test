name: Build & Deploy Flask App

on:
  push:
    branches: [staging, pre-prod, master]
    paths:
      - 'flask_app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast on Python syntax errors before building/pushing/deploying.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: flask_app/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r flask_app/requirements.txt

      - name: Python syntax check
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q flask_app

      - name: Login to Docker Hub
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/my-flask-app:${{ github.ref_name }}"
          docker build -t "$IMAGE" .

      # Extra guard: validate Python imports/syntax inside the built image too.
      - name: Smoke check Docker image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/my-flask-app:${{ github.ref_name }}"
          docker run --rm "$IMAGE" python -m compileall -q /app
          docker run --rm "$IMAGE" python -c "import app"

      - name: Push Docker Image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/my-flask-app:${{ github.ref_name }}"
          docker push "$IMAGE"

      - name: Deploy Container
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "staging" ]; then
            PORT=5001
          elif [ "$BRANCH" = "pre-prod" ]; then
            PORT=5002
          elif [ "$BRANCH" = "master" ]; then
            PORT=5003
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

          IMAGE="${{ secrets.DOCKER_USERNAME }}/my-flask-app:$BRANCH"

          docker pull "$IMAGE"
          docker rm -f "$BRANCH-app" || true

          docker run -d -p "$PORT:5000" \
            --name "$BRANCH-app" \
            -e ENVIRONMENT="$BRANCH" \
            "$IMAGE"

          # `docker run -d` can succeed even if the container exits immediately.
          for _ in {1..10}; do
            if docker inspect -f '{{.State.Running}}' "$BRANCH-app" | grep -q true; then
              break
            fi
            sleep 1
          done

          if ! docker inspect -f '{{.State.Running}}' "$BRANCH-app" | grep -q true; then
            echo "Container failed to stay running"
            docker logs "$BRANCH-app" || true
            exit 1
          fi

          # Basic health check (fails the workflow if the app is not responding).
          for _ in {1..20}; do
            if curl -fsS "http://localhost:$PORT/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Health check failed"
          docker logs "$BRANCH-app" || true
          exit 1
